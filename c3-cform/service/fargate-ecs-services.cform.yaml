Description: Fargate Service on ECS

Parameters:
  TenantId:
    Type: String
    Default: c3

  EnvId:
    Type: String
    Default: project

  ServiceName:
    Type: String
    Default: c3-api

  ContainerImageUri:
    Type: String
    Description: Container image URI

  ContainerPort:
    Type: Number
    Default: 80
    Description: Container listener port

  TaskCpu:
    Type: String
    Default: "512"
    Description: Fargate task CPU units

  TaskMemory:
    Type: String
    Default: "1024"
    Description: Fargate task memory (MiB)

  DesiredCount:
    Type: Number
    Default: 1
    Description: Desired ECS service task count

  PathPatterns:
    Type: CommaDelimitedList
    Default: "/,/*"
    Description: ALB listener rule path patterns

  ListenerRulePriority:
    Type: Number
    Default: 2048
    Description: ALB listener rule priority

  C3IndexMessage:
    Type: String
    Default: Welcome to C3 API on ECS
    Description: Message returned by the API index endpoint

Resources:
  ECS2048TaskDefinition:
    Type: AWS::ECS::TaskDefinition
    Properties:
      Family: !Sub "${EnvId}-${ServiceName}"
      NetworkMode: awsvpc
      RequiresCompatibilities:
        - FARGATE
      Cpu: !Ref TaskCpu
      Memory: !Ref TaskMemory
      ExecutionRoleArn:
        Fn::ImportValue: !Sub "${EnvId}-ExecutionRoleArn"
      ContainerDefinitions:
        - Name: !Ref ServiceName
          Image: !Ref ContainerImageUri
          Environment:
            - Name: C3_INDEX_MESSAGE
              Value: !Ref C3IndexMessage
          PortMappings:
            - ContainerPort: !Ref ContainerPort
              Protocol: tcp
          LogConfiguration:
            LogDriver: awslogs
            Options:
              awslogs-group:
                Fn::ImportValue: !Sub "${EnvId}-AppLogGroupName"
              awslogs-region: !Ref AWS::Region
              awslogs-stream-prefix: ecs

  ECS2048SecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: !Sub "${EnvId}-${ServiceName} Security Group"
      VpcId:
        Fn::ImportValue: !Sub "${TenantId}-VpcId"
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: !Ref ContainerPort
          ToPort: !Ref ContainerPort
          SourceSecurityGroupId:
            Fn::ImportValue: !Sub "${EnvId}-ALBSecurityGroupId"
      SecurityGroupEgress:
        - IpProtocol: -1
          FromPort: 0
          ToPort: 0
          CidrIp: 0.0.0.0/0

  ECS2048Service:
    Type: AWS::ECS::Service
    Properties:
      ServiceName: !Sub "${EnvId}-${ServiceName}"
      Cluster:
        Fn::ImportValue: !Sub "${EnvId}-ECSClusterName"
      LaunchType: FARGATE
      DesiredCount: !Ref DesiredCount
      TaskDefinition: !Ref ECS2048TaskDefinition
      NetworkConfiguration:
        AwsvpcConfiguration:
          AssignPublicIp: ENABLED
          Subnets:
            - Fn::ImportValue: !Sub "${TenantId}-PublicSubnet1Id"
            - Fn::ImportValue: !Sub "${TenantId}-PublicSubnet2Id"
            - Fn::ImportValue: !Sub "${TenantId}-PublicSubnet3Id"
          SecurityGroups:
            - !Ref ECS2048SecurityGroup
      LoadBalancers:
        - ContainerName: !Ref ServiceName
          ContainerPort: !Ref ContainerPort
          TargetGroupArn: !Ref ECS2048TargetGroup
      EnableECSManagedTags: true
      PropagateTags: SERVICE

  ECS2048TargetGroup:
    Type: AWS::ElasticLoadBalancingV2::TargetGroup
    Properties:
      Name: !Sub "${EnvId}-${ServiceName}"
      Port: !Ref ContainerPort
      Protocol: HTTP
      TargetType: ip
      VpcId:
        Fn::ImportValue: !Sub "${TenantId}-VpcId"
      HealthCheckProtocol: HTTP
      HealthCheckPath: /
      Matcher:
        HttpCode: "200"

  ECSListenerRule2048:
    Type: AWS::ElasticLoadBalancingV2::ListenerRule
    Properties:
      ListenerArn: 
        Fn::ImportValue: !Sub "${EnvId}-HttpsListenerArn"
      Priority: !Ref ListenerRulePriority
      Conditions:
        - Field: path-pattern
          Values: !Ref PathPatterns
      Actions:
        - Type: forward
          TargetGroupArn: !Ref ECS2048TargetGroup

  ECSHttpListenerRule2048:
    Type: AWS::ElasticLoadBalancingV2::ListenerRule
    Properties:
      ListenerArn:
        Fn::ImportValue: !Sub "${EnvId}-HttpListenerArn"
      Priority: !Ref ListenerRulePriority
      Conditions:
        - Field: path-pattern
          Values: !Ref PathPatterns
      Actions:
        - Type: forward
          TargetGroupArn: !Ref ECS2048TargetGroup

Outputs:
  ECS2048TaskDefinitionRef:
    Description: The Ref ECS Task Definition
    Value: !Ref ECS2048TaskDefinition
    Export:
      Name: !Sub "${EnvId}-${ServiceName}TaskDefinitionRef"