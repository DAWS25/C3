Description: Fargate Service on ECS

Parameters:
  TenantId:
    Type: String
    Default: c3

  EnvId:
    Type: String
    Default: project

  ApiDomainName:
    Type: String
    Description: DNS record name to map to the API ALB endpoint.
    AllowedPattern: ^[a-zA-Z0-9][a-zA-Z0-9-_.]*[a-zA-Z0-9]$

  HostedZoneId:
    Type: String
    Description: Route53 hosted zone ID where the API alias record is created.

  ServiceName:
    Type: String
    Default: c3-api

  ContainerImageUri:
    Type: String
    Description: Container image URI

  ContainerPort:
    Type: Number
    Default: 80
    Description: Container listener port

  TaskCpu:
    Type: String
    Default: "512"
    Description: Fargate task CPU units

  TaskMemory:
    Type: String
    Default: "1024"
    Description: Fargate task memory (MiB)

  DesiredCount:
    Type: Number
    Default: 1
    Description: Desired ECS service task count

  AssignPublicIp:
    Type: String
    Default: DISABLED
    AllowedValues:
      - ENABLED
      - DISABLED
    Description: Whether to assign public IPs to Fargate tasks

  PathPatterns:
    Type: CommaDelimitedList
    Default: "/,/*"
    Description: ALB listener rule path patterns

  HealthCheckPath:
    Type: String
    Default: /api/
    Description: ALB target group health check path

  HealthCheckGracePeriodSeconds:
    Type: Number
    Default: 30
    Description: ECS service grace period before target health checks are enforced

  TargetHealthCheckIntervalSeconds:
    Type: Number
    Default: 15
    Description: ALB target group health check interval in seconds

  TargetHealthCheckTimeoutSeconds:
    Type: Number
    Default: 5
    Description: ALB target group health check timeout in seconds

  TargetHealthyThresholdCount:
    Type: Number
    Default: 2
    Description: Consecutive successful health checks required to mark healthy

  TargetUnhealthyThresholdCount:
    Type: Number
    Default: 2
    Description: Consecutive failed health checks required to mark unhealthy

  ListenerRulePriority:
    Type: Number
    Default: 10274
    Description: ALB listener rule priority

  C3Version:
    Type: String
    Default: latest
    Description: Build version exposed to the container as C3_VERSION

  C3IndexMessage:
    Type: String
    Default: Welcome to C3 API on ECS
    Description: Message returned by the API index endpoint

Resources:
  ECSAPITaskDefinition:
    Type: AWS::ECS::TaskDefinition
    Properties:
      Family: !Sub "${EnvId}-${ServiceName}"
      NetworkMode: awsvpc
      RequiresCompatibilities:
        - FARGATE
      Cpu: !Ref TaskCpu
      Memory: !Ref TaskMemory
      ExecutionRoleArn:
        Fn::ImportValue: !Sub "${EnvId}-ExecutionRoleArn"
      ContainerDefinitions:
        - Name: !Ref ServiceName
          Image: !Ref ContainerImageUri
          Environment:
            - Name: C3_VERSION
              Value: !Ref C3Version
            - Name: QUARKUS_PROFILE
              Value: ecs
          PortMappings:
            - ContainerPort: !Ref ContainerPort
              Protocol: tcp
          LogConfiguration:
            LogDriver: awslogs
            Options:
              awslogs-group:
                Fn::ImportValue: !Sub "${EnvId}-AppLogGroupName"
              awslogs-create-group: "true"
              awslogs-region: !Ref AWS::Region
              awslogs-stream-prefix: "c3-api"

  ECSAPISecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: !Sub "${EnvId}-${ServiceName} Security Group"
      VpcId:
        Fn::ImportValue: !Sub "${TenantId}-VpcId"
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: !Ref ContainerPort
          ToPort: !Ref ContainerPort
          CidrIp: 0.0.0.0/0
      SecurityGroupEgress:
        - IpProtocol: -1
          FromPort: 0
          ToPort: 0
          CidrIp: 0.0.0.0/0

  ECSAPIService:
    Type: AWS::ECS::Service
    Properties:
      ServiceName: !Sub "${EnvId}-${ServiceName}"
      Cluster:
        Fn::ImportValue: !Sub "${EnvId}-ECSClusterName"
      LaunchType: FARGATE
      DesiredCount: !Ref DesiredCount
      HealthCheckGracePeriodSeconds: !Ref HealthCheckGracePeriodSeconds
      DeploymentConfiguration:
        DeploymentCircuitBreaker:
          Enable: true
          Rollback: true
      TaskDefinition: !Ref ECSAPITaskDefinition
      NetworkConfiguration:
        AwsvpcConfiguration:
          AssignPublicIp: !Ref AssignPublicIp
          Subnets:
            - Fn::ImportValue: !Sub "${TenantId}-PublicSubnet1Id"
            - Fn::ImportValue: !Sub "${TenantId}-PublicSubnet2Id"
            - Fn::ImportValue: !Sub "${TenantId}-PublicSubnet3Id"
          SecurityGroups:
            - !Ref ECSAPISecurityGroup
      LoadBalancers:
        - ContainerName: !Ref ServiceName
          ContainerPort: !Ref ContainerPort
          TargetGroupArn: !Ref ECSAPITargetGroup
      EnableECSManagedTags: true
      PropagateTags: SERVICE

  ECSAPITargetGroup:
    Type: AWS::ElasticLoadBalancingV2::TargetGroup
    Properties:
      Name: !Sub "${EnvId}-${ServiceName}"
      Port: !Ref ContainerPort
      Protocol: HTTP
      TargetType: ip
      VpcId:
        Fn::ImportValue: !Sub "${TenantId}-VpcId"
      HealthCheckProtocol: HTTP
      HealthCheckPath: !Ref HealthCheckPath
      HealthCheckIntervalSeconds: !Ref TargetHealthCheckIntervalSeconds
      HealthCheckTimeoutSeconds: !Ref TargetHealthCheckTimeoutSeconds
      HealthyThresholdCount: !Ref TargetHealthyThresholdCount
      UnhealthyThresholdCount: !Ref TargetUnhealthyThresholdCount
      Matcher:
        HttpCode: "200-399"

  ECSListenerRule:
    Type: AWS::ElasticLoadBalancingV2::ListenerRule
    Properties:
      ListenerArn: 
        Fn::ImportValue: !Sub "${EnvId}-HttpsListenerArn"
      Priority: !Ref ListenerRulePriority
      Conditions:
        - Field: path-pattern
          Values: !Ref PathPatterns
      Actions:
        - Type: forward
          TargetGroupArn: !Ref ECSAPITargetGroup

  ApiDNSRecord:
    Type: AWS::Route53::RecordSet
    Properties:
      HostedZoneId: !Ref HostedZoneId
      Name: !Ref ApiDomainName
      Type: A
      AliasTarget:
        DNSName:
          Fn::ImportValue: !Sub "${EnvId}-ALBDNSName"
        HostedZoneId:
          Fn::ImportValue: !Sub "${EnvId}-ALBZoneId"

Outputs:
  ECSAPITaskDefinitionRef:
    Description: The Ref ECS Task Definition
    Value: !Ref ECSAPITaskDefinition
    Export:
      Name: !Sub "${EnvId}-${ServiceName}TaskDefinitionRef"

  ApiAliasRecordName:
    Description: API alias record DNS name
    Value: !Ref ApiDomainName
