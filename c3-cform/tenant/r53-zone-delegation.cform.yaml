# aws cloudformation deploy --stack-name c3-r53-zone-delegation-stack --template-file c3-cform/tenant/r53-zone-delegation.cform.yaml --parameter-overrides ParentZoneId=Z1234567890ABCDE DelegatedSubdomain=c3.daws25.com TenantId=c3
# aws cloudformation delete-stack --stack-name c3-r53-zone-delegation-stack
Description: delegate a tenant subdomain from a parent Route 53 hosted zone

Parameters:
  ParentZoneId:
    Type: String
    Description: Zone ID of the parent domain (e.g., daws25.com)

  DelegatedSubdomain:
    Type: String
    Description: Fully qualified subdomain to delegate (e.g., c3.daws25.com)

  TenantId:
    Type: String
    Description: Tenant identifier used as the export prefix

Resources:
  TenantDelegationRecord:
    Type: AWS::Route53::RecordSet
    Properties:
      HostedZoneId: !Ref ParentZoneId
      Name: !Ref DelegatedSubdomain
      Type: NS
      TTL: 300
      ResourceRecords:
        Fn::Split:
          - ","
          - Fn::ImportValue: !Sub "${TenantId}-NameServers"

Outputs:
  DelegatedRecordName:
    Description: The delegated NS record name created in the parent hosted zone
    Value: !Ref DelegatedSubdomain

  DelegationNameServers:
    Description: Name servers used for delegation
    Value:
      Fn::ImportValue: !Sub "${TenantId}-NameServers"
